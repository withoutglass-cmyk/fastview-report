<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채널별 매출 증/감 시뮬레이션</title>

<meta property="og:title" content="채널별 매출 증/감 시뮬레이션">
<meta property="og:description" content="FASTVIEW 매체사별 광고 매출·PV 데이터 분석 리포트">
<meta property="og:url" content="https://fastview-analytics.netlify.app">

<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; max-width: 1200px; margin: 40px auto; padding: 0 20px; color: #111; }
  h1 { font-size: 1.3rem; margin-bottom: 16px; }
  .controls { background: #f1f5f9; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-label { font-size: .7rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
  .ctrl-row { display: flex; align-items: center; gap: 6px; }
  .controls select { padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .875rem; background: #fff; }
  .controls input[type=number] { padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .875rem; width: 90px; background: #fff; }
  .ctrl-sep { color: #cbd5e1; font-size: 1.2rem; padding: 0 2px; align-self: flex-end; margin-bottom: 2px; }
  .toggle-group { display: flex; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; background: #fff; }
  .toggle-btn { padding: 5px 12px; font-size: .8rem; cursor: pointer; color: #475569; transition: background .15s, color .15s; white-space: nowrap; }
  .toggle-btn:has(input:checked) { background: #1e293b; color: #fff; }
  .toggle-btn input { display: none; }
  .ctrl-info { font-size: .75rem; color: #94a3b8; align-self: flex-end; margin-bottom: 4px; }
  .summary { display: flex; gap: 32px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-start; }
  .summary-item .label { font-size: .75rem; color: #6b7280; }
  .summary-item .value { font-size: 1.25rem; font-weight: 700; }
  .goal-bar-wrap { margin-top: 4px; background: #e2e8f0; border-radius: 4px; height: 6px; width: 140px; }
  .goal-bar { height: 6px; border-radius: 4px; background: #0ea5e9; transition: width .3s; }
  .chart-wrap { margin-bottom: 20px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
  input[type=text] { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; width: 200px; font-size: .875rem; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  th { background: #1e293b; color: #fff; padding: 8px 12px; text-align: left; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: #334155; }
  th.sorted-asc::after { content: " ▲"; font-size: .7rem; }
  th.sorted-desc::after { content: " ▼"; font-size: .7rem; }
  td { padding: 7px 12px; border-bottom: 1px solid #e2e8f0; }
  tr:hover td { background: #f8fafc; }
  .pair-row td { background: #f0f9ff; }
  .pair-row:hover td { background: #e0f2fe; }
</style>
</head>
<body>
<h1>채널별 매출 증/감 시뮬레이션</h1>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">기준 날짜</span>
    <div class="ctrl-row"><select id="targetDate" onchange="updateView()"><option value="2026-06-08">2026-06-08</option></select></div>
  </div>
  <div class="ctrl-sep">vs</div>
  <div class="ctrl-group">
    <span class="ctrl-label">비교 기간</span>
    <div class="ctrl-row">
      <select id="startDate" onchange="updateView()"><option value="2026-06-08">2026-06-08</option></select>
      <span style="color:#94a3b8">~</span>
      <select id="endDate" onchange="updateView()"><option value="2026-06-08">2026-06-08</option></select>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">비교 방식</span>
    <div class="toggle-group">
      <label class="toggle-btn"><input type="radio" name="compMode" value="avg" onchange="updateView()" checked>예상마감 평균</label>
      <label class="toggle-btn"><input type="radio" name="compMode" value="perf" onchange="updateView()">기간 퍼포먼스</label>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">테크+닷키</span>
    <div class="toggle-group">
      <label class="toggle-btn"><input type="radio" name="pairMode" value="split" onchange="updateView()" checked>분리</label>
      <label class="toggle-btn"><input type="radio" name="pairMode" value="merge" onchange="updateView()">합산</label>
    </div>
  </div>
  <div class="ctrl-info" id="compLabel"></div>
  <div class="ctrl-group" style="margin-left:auto">
    <span class="ctrl-label">이달 목표</span>
    <div class="ctrl-row">
      <input type="number" id="goalInput" placeholder="만원" oninput="updateGoal()">
      <span style="font-size:.8rem;color:#64748b">만원</span>
    </div>
  </div>
</div>

<div class="summary">
  <div class="summary-item"><div class="label" id="todayLabel">기준 예상 마감</div><div class="value" id="sumToday">-</div></div>
  <div class="summary-item"><div class="label" id="prevLabel">비교 예상 마감</div><div class="value" id="sumPrev">-</div></div>
  <div class="summary-item"><div class="label">변화</div><div class="value" id="sumDiff">-</div></div>
  <div class="summary-item" id="goalSection" style="display:none">
    <div class="label">예상 달성률</div>
    <div class="value" id="sumGoal">-</div>
    <div class="goal-bar-wrap"><div class="goal-bar" id="goalBar" style="width:0%"></div></div>
  </div>
</div>

<div class="chart-wrap">
  <canvas id="diffChart" height="70"></canvas>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="채널명 검색..." oninput="filterTable()">
</div>
<table>
  <thead>
    <tr>
      <th onclick="sortTable(0)">채널</th>
      <th onclick="sortTable(1)">기준 예상 마감</th>
      <th onclick="sortTable(2)" id="thPrev">비교 예상 마감</th>
      <th onclick="sortTable(3)">변화</th>
      <th onclick="sortTable(4)">매출 변화율</th>
      <th onclick="sortTable(5)">PV 변화율</th>
      <th onclick="sortTable(6)">단가 변화량</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const allData = {"2026-06-08": {"elapsed": 8, "month_days": 30, "total_projected": 71760382.5, "channels": {"DC-2023-0066": {"name": "뷰어스(feed.viewus.co.kr)", "projected": 23447085.0, "daily_pv": 80551.375, "cpm": 9.702745608004829}, "FVDC-2023-0002": {"name": "디시이슈 피드", "projected": 3301938.75, "daily_pv": 103521.5, "cpm": 1.0632054693952464}, "DC-2022-0050": {"name": "뉴스벨", "projected": 12317302.5, "daily_pv": 80229.875, "cpm": 5.117504545532447}, "DC-2025-0032": {"name": "테크프레스(모먼트플로우)", "projected": 4475235.0, "daily_pv": 30314.375, "cpm": 4.92091623198565}, "DC-2025-0010": {"name": "인포루프", "projected": 13851090.0, "daily_pv": 62381.0, "cpm": 7.401340151648739}, "DC-2023-0036": {"name": "네이트뷰", "projected": 785302.5, "daily_pv": 26660.5, "cpm": 0.9818551790101461}, "DC-2023-0063": {"name": "뷰타임즈", "projected": 2528958.75, "daily_pv": 37751.5, "cpm": 2.232987430963008}, "DC-2026-0005": {"name": "여기어디(넵플리즈)", "projected": 6773523.75, "daily_pv": 23428.125, "cpm": 9.637310924369748}, "DC-2023-0038": {"name": "스타스타일", "projected": 1071285.0, "daily_pv": 4753.5, "cpm": 7.512254128536868}, "FVDC-2023-0003": {"name": "네이트 자동차 피드", "projected": 337785.0, "daily_pv": 4836.875, "cpm": 2.3278459749321616}, "FVDC-2023-0017": {"name": "핫식신", "projected": 228191.25, "daily_pv": 3606.5, "cpm": 2.1090738943574103}, "DC-2025-0031": {"name": "트래픽뷰", "projected": 525873.75, "daily_pv": 1506.5, "cpm": 11.635662130766677}, "FVDC-2023-0024": {"name": "오만이슈", "projected": 990465.0, "daily_pv": 1081.5, "cpm": 30.527508090614887}, "DC-2025-0019": {"name": "운세TV", "projected": 216765.0, "daily_pv": 1008.25, "cpm": 7.166377386560873}, "FVDC-2023-0012": {"name": "닷키프레스", "projected": 411585.0, "daily_pv": 1638.625, "cpm": 8.372568464413762}, "DC-2025-0011": {"name": "밈미디어(유통)", "projected": 1635.0, "daily_pv": 477.625, "cpm": 0.11410625490709238}, "DC-2022-0035": {"name": "여행플러스", "projected": 10233.75, "daily_pv": 1248.375, "cpm": 0.27325523180134176}, "DC-2023-0040": {"name": "TMI 뉴스", "projected": 115991.25, "daily_pv": 735.125, "cpm": 5.259479680326475}, "FVDC-2023-0010": {"name": "하우스매거진", "projected": 26332.5, "daily_pv": 373.125, "cpm": 2.352428810720268}, "FVDC-2023-0009": {"name": "카앤모어", "projected": 28665.0, "daily_pv": 335.375, "cpm": 2.849049571375326}, "DC-2023-0005": {"name": "집꾸미기", "projected": 16496.25, "daily_pv": 223.375, "cpm": 2.4616675993284836}, "DC-2026-0012": {"name": "오버히트", "projected": 13342.5, "daily_pv": 164.375, "cpm": 2.705703422053232}, "DC-2023-0065": {"name": "맥스EN", "projected": 6063.75, "daily_pv": 143.875, "cpm": 1.4048653344917463}, "DC-2022-0031": {"name": "카글", "projected": 3480.0, "daily_pv": 57.25, "cpm": 2.0262008733624453}, "DC-2024-0012": {"name": "퓨어비프", "projected": 847.5, "daily_pv": 26.375, "cpm": 1.0710900473933649}, "DC-2025-0024": {"name": "디에이블", "projected": 7560.0, "daily_pv": 46.25, "cpm": 5.448648648648649}, "DC-2025-0020": {"name": "운세TV (워프)", "projected": 0.0, "daily_pv": 26.0, "cpm": 0.0}, "DC-2025-0022": {"name": "이앤투어픽", "projected": 731.25, "daily_pv": 7.125, "cpm": 3.4210526315789473}, "DC-2022-0002": {"name": "디시이슈", "projected": 0.0, "daily_pv": 0.0, "cpm": 0}, "DC-2022-0024": {"name": "버즈타임즈", "projected": 0.0, "daily_pv": 0.0, "cpm": 0}, "DC-2022-0033": {"name": "버터팝콘", "projected": 0.0, "daily_pv": 0.0, "cpm": 0}, "DC-2022-0026": {"name": "위키트리 픽", "projected": 0.0, "daily_pv": 0.0, "cpm": 0}, "FVDC-2023-0022": {"name": "드라마엔리뷰엔", "projected": 0.0, "daily_pv": 0.0, "cpm": 0}, "FVDC-2024-1111": {"name": "네이트 자동차 탭(쿠팡)", "projected": 266580.0, "daily_pv": 0.0, "cpm": 0}, "FVDC-2024-0007": {"name": "모빌리티 인사이트", "projected": 37.5, "daily_pv": 0.0, "cpm": 0}}}};
const allDates = ["2026-06-08"];
const pairCodes = [["DC-2025-0032", "FVDC-2023-0012"]];

let chart = null;
let currentRows = [];
let sortCol = 3;
let sortAsc = false;

window.onload = function() {
  document.getElementById('targetDate').value = '2026-06-08';
  document.getElementById('startDate').value = '2026-06-08';
  document.getElementById('endDate').value = '2026-06-08';

  chart = new Chart(document.getElementById('diffChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{ label: '변화 (만원)', data: [], backgroundColor: [] }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: '만원' } } }
    }
  });

  updateView();
};

function getComparison_perf(startDate, endDate) {
  const dates = allDates.filter(d => d >= startDate && d <= endDate).sort();
  if (!dates.length) return null;

  const endD   = dates[dates.length - 1];
  const prevD  = allDates.filter(d => d < startDate).sort().slice(-1)[0] ?? null;
  const endMeta = allData[endD];
  const periodDays = dates.length;
  const channels = {};

  for (const code of Object.keys(endMeta.channels)) {
    const eCh = endMeta.channels[code];
    const pCh = prevD ? allData[prevD]?.channels[code] : null;

    const eRev = eCh.projected * endMeta.elapsed / endMeta.month_days;
    const ePV  = eCh.daily_pv  * endMeta.elapsed;
    const pRev = pCh ? pCh.projected * allData[prevD].elapsed / allData[prevD].month_days : 0;
    const pPV  = pCh ? pCh.daily_pv  * allData[prevD].elapsed : 0;

    const periodRev = eRev - pRev;
    const periodPV  = ePV  - pPV;

    channels[code] = {
      name:      eCh.name,
      projected: (periodRev / periodDays) * endMeta.month_days,
      daily_pv:  periodPV / periodDays,
      cpm:       periodPV > 0 ? periodRev / periodPV : 0,
    };
  }

  const label = periodDays === 1 ? endD : `${dates[0]} ~ ${endD} 퍼포먼스(${periodDays}일)`;
  return {
    total_projected: Object.values(channels).reduce((s, c) => s + c.projected, 0),
    channels, label,
  };
}

function getComparison(startDate, endDate) {
  const dates = allDates.filter(d => d >= startDate && d <= endDate);
  if (!dates.length) return null;

  const channels = {};
  for (const code of Object.keys(allData[dates[0]].channels)) {
    const proj = dates.map(d => allData[d]?.channels[code]?.projected ?? 0);
    const pv   = dates.map(d => allData[d]?.channels[code]?.daily_pv ?? 0);
    const cpm  = dates.map(d => allData[d]?.channels[code]?.cpm ?? 0);
    const avg  = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
    channels[code] = {
      name: allData[dates[0]].channels[code].name,
      projected: avg(proj), daily_pv: avg(pv), cpm: avg(cpm),
    };
  }

  const label = dates.length === 1
    ? dates[0]
    : `${dates[0]} ~ ${dates[dates.length-1]} 평균(${dates.length}일)`;

  return {
    total_projected: Object.values(channels).reduce((s, c) => s + c.projected, 0),
    channels, label,
  };
}

function fmtAbs(v) {
  const a = Math.abs(v);
  if (a >= 100000000) return (a/100000000).toFixed(1) + '억원';
  if (a >= 10000) return Math.round(a/10000) + '만원';
  if (a === 0) return '0원';
  return Math.round(a).toLocaleString() + '원';
}

function fmtCpm(v) {
  const a = Math.abs(v), s = v > 0 ? '+' : v < 0 ? '-' : '';
  if (a === 0) return '0원';
  if (a >= 1) return s + Math.round(a).toLocaleString() + '원';
  return s + a.toFixed(2) + '원';
}

function fmtKrw(v) {
  const a = Math.abs(v), s = v > 0 ? '+' : v < 0 ? '-' : '';
  if (a >= 100000000) return s + (a/100000000).toFixed(1) + '억원';
  if (a >= 10000)     return s + Math.round(a/10000) + '만원';
  if (a === 0)        return '0원';
  return s + Math.round(a).toLocaleString() + '원';
}

function arrow(v) { return v > 0 ? '▲' : v < 0 ? '▼' : '━'; }
function pct(v)   { return (v >= 0 ? '+' : '') + (v*100).toFixed(1) + '%'; }

function updateView() {
  const targetDate = document.getElementById('targetDate').value;
  const startDate  = document.getElementById('startDate').value;
  const endDate    = document.getElementById('endDate').value;

  const target = allData[targetDate];
  const mode   = document.querySelector('input[name="compMode"]:checked').value;
  const comp   = mode === 'perf' ? getComparison_perf(startDate, endDate) : getComparison(startDate, endDate);
  if (!target || !comp) return;

  const totalDiff = target.total_projected - comp.total_projected;
  document.getElementById('sumPrev').textContent  = fmtKrw(comp.total_projected);
  const sumTodayEl = document.getElementById('sumToday');
  sumTodayEl.textContent = fmtKrw(target.total_projected);
  sumTodayEl.dataset.raw = target.total_projected;
  const diffEl = document.getElementById('sumDiff');
  diffEl.textContent = arrow(totalDiff) + ' ' + fmtAbs(totalDiff);
  diffEl.style.color = totalDiff > 0 ? '#16a34a' : totalDiff < 0 ? '#dc2626' : '#6b7280';
  document.getElementById('compLabel').textContent = '비교: ' + comp.label;
  document.getElementById('thPrev').textContent = comp.label.length > 20 ? '비교 예상 마감' : comp.label;

  const pairMode = document.querySelector('input[name="pairMode"]:checked').value;
  const pairCodesFlat = pairMode === 'merge' ? new Set(pairCodes.flat()) : new Set();
  const rows = [];

  for (const [code, tCh] of Object.entries(target.channels)) {
    if (pairCodesFlat.has(code)) continue;
    const cCh = comp.channels[code];
    if (!cCh) continue;
    const projDiff    = tCh.projected - cCh.projected;
    const revenueChg  = cCh.projected ? projDiff / cCh.projected : 0;
    const pvChg       = cCh.daily_pv  ? (tCh.daily_pv - cCh.daily_pv) / cCh.daily_pv : 0;
    const cpmDiff     = tCh.cpm - cCh.cpm;
    rows.push({ code, name: tCh.name, projDiff, revenueChg, pvChg, cpmDiff,
                 tProj: tCh.projected, cProj: cCh.projected, isPair: false });
  }

  if (pairMode === 'merge') {
    for (const [codeA, codeB] of pairCodes) {
      const tA = target.channels[codeA], tB = target.channels[codeB];
      const cA = comp.channels[codeA],   cB = comp.channels[codeB];
      if (tA && tB && cA && cB) {
        rows.push({
          name: tA.name + ' + ' + tB.name + ' (합산)',
          tProj: tA.projected + tB.projected,
          cProj: cA.projected + cB.projected,
          projDiff: (tA.projected + tB.projected) - (cA.projected + cB.projected),
          revenueChg: 0, pvChg: 0, cpmDiff: 0, isPair: true,
        });
      }
    }
  }

  currentRows = rows;
  renderTable();
  updateChart(rows.filter(r => !r.isPair));
  updateGoal();
}

function updateGoal() {
  const raw = parseFloat(document.getElementById('goalInput').value);
  const section = document.getElementById('goalSection');
  if (!raw || isNaN(raw)) { section.style.display = 'none'; return; }
  const goalWon = raw * 10000;
  const projected = parseFloat(document.getElementById('sumToday').dataset.raw || 0);
  if (!projected) { section.style.display = 'none'; return; }
  const rate = projected / goalWon * 100;
  section.style.display = '';
  document.getElementById('sumGoal').textContent = rate.toFixed(1) + '%';
  document.getElementById('sumGoal').style.color = rate >= 100 ? '#16a34a' : rate >= 80 ? '#d97706' : '#dc2626';
  document.getElementById('goalBar').style.width = Math.min(rate, 100) + '%';
  document.getElementById('goalBar').style.background = rate >= 100 ? '#16a34a' : rate >= 80 ? '#d97706' : '#dc2626';
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const sorted = [...currentRows].sort((a, b) => {
    let va, vb;
    if (sortCol === 0) { va = a.name; vb = b.name; return sortAsc ? va.localeCompare(vb,'ko') : vb.localeCompare(va,'ko'); }
    const vals = [null, r => r.tProj, r => r.cProj, r => r.projDiff, r => r.revenueChg, r => r.pvChg, r => r.cpmDiff];
    va = vals[sortCol](a); vb = vals[sortCol](b);
    return sortAsc ? va - vb : vb - va;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (const d of sorted) {
    if (q && !d.name.toLowerCase().includes(q)) continue;
    const color = d.projDiff > 0 ? '#16a34a' : d.projDiff < 0 ? '#dc2626' : '#6b7280';
    const tr = document.createElement('tr');
    if (d.isPair) tr.className = 'pair-row';
    tr.innerHTML = `
      <td>${d.isPair ? '<strong>' + d.name + '</strong>' : d.name}</td>
      <td>${fmtKrw(d.tProj)}</td>
      <td>${fmtKrw(d.cProj)}</td>
      <td style="color:${color};font-weight:600">${arrow(d.projDiff)} ${fmtAbs(d.projDiff)}</td>
      <td>${d.isPair ? '-' : pct(d.revenueChg)}</td>
      <td>${d.isPair ? '-' : pct(d.pvChg)}</td>
      <td>${d.isPair ? '-' : fmtCpm(d.cpmDiff)}</td>
    `;
    tbody.appendChild(tr);
  }
}

function updateChart(rows) {
  const top = [...rows].sort((a,b) => Math.abs(b.projDiff)-Math.abs(a.projDiff)).slice(0,15);
  chart.data.labels = top.map(d => d.name);
  chart.data.datasets[0].data = top.map(d => Math.round(d.projDiff/10000));
  chart.data.datasets[0].backgroundColor = top.map(d => d.projDiff >= 0 ? '#16a34a' : '#dc2626');
  chart.update();
}

function filterTable() { renderTable(); }

let lastSortCol = -1;
function sortTable(col) {
  if (lastSortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = false; lastSortCol = col; }
  sortCol = col;
  document.querySelectorAll('th').forEach((th, i) => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (i === col) th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
  });
  renderTable();
}

function parseNum(col, text) {
  text = text.trim();
  if (col === 0) return text;
  if (text.endsWith('%')) return parseFloat(text) || 0;
  let sign = text.includes('▼') ? -1 : 1;
  text = text.replace(/[▲▼━\s+]/g, '');
  if (text.includes('억원')) return sign * parseFloat(text) * 100000000;
  if (text.includes('만원')) return sign * parseFloat(text) * 10000;
  if (text.includes('원'))   return sign * (parseFloat(text.replace(/,/g,'')) || 0);
  return sign * (parseFloat(text.replace(/,/g,'')) || 0);
}
